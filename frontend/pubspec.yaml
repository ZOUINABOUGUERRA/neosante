name: neosante
description: Intelligent Neonatal System - Newborn medical management
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.10.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  async: ^2.12.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0

  # State & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.6.2

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  #path_provider: ^2.1.4
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3

  # UI
  fl_chart: ^0.69.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^6.3.3

  # Media
  image_picker: ^1.1.2
  path: ^1.9.0
  file_picker: ^8.1.4
  share_plus: ^10.1.4

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.13.4

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2     # ✅ تم التصحيح: من ^0.19.0 إلى ^0.20.2

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.5
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1


flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/animations/
    - assets/images/
    - assets/fonts/