name: neosante
description: Intelligent Neonatal System - Newborn medical management
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0

  # State & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.2.3

  # UI
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  share_plus: ^10.1.4

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.13.4

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/animations/
    - assets/images/
